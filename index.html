function CoinIcon({id,size=40}){ const c=ALL.find(x=>x.id===id)||ALL[0]; return <div style={{width:size,height:size,borderRadius:'50%',background:c.clr,display:'flex',alignItems:'center',justifyContent:'center',fontSize:size*.4,fontWeight:700,color:'#fff',flexShrink:0,transition:'all .3s'}}>{c.sym}</div> }

function Counter({to,dec=0,pre='',suf=''}){
  const[v,setV]=useState(0); const ref=useRef(null); const ran=useRef(false);
  useEffect(()=>{
    const obs=new IntersectionObserver(([e])=>{
      if(e.isIntersecting&&!ran.current){ ran.current=true; const steps=50,inc=to/steps; let c=0;
        const iv=setInterval(()=>{c+=inc;if(c>=to){setV(to);clearInterval(iv)}else setV(c)},2000/steps)}
    },{threshold:.3});
    if(ref.current)obs.observe(ref.current); return()=>obs.disconnect();
  },[to]);
  return <span ref={ref}>{pre}{dec?v.toFixed(dec):Math.floor(v).toLocaleString()}{suf}</span>;
}

function useReveal(){
  useEffect(()=>{
    const obs=new IntersectionObserver(es=>{ es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target)}}) },{threshold:.12});
    document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
    return()=>obs.disconnect();
  });
}

/* ═══════════════ CALCULATOR ═══════════════ */
function Calculator({t}){
  const[from,setFrom]=useState('USDT_TRC20');
  const[to,setTo]=useState('EUR');

  const fObj=ALL.find(c=>c.id===from), tObj=ALL.find(c=>c.id===to);

  const{r,fee,rate}=calc(from,to,n);
  const avail=ALL.filter(c=>c.id!==from&&isC(c.id)!==isC(from));
  useEffect(()=>{if(!avail.find(c=>c.id===to))setTo(avail[0]?.id||'EUR')},[from]);
  const doSwap=()=>{setFrom(to);setTo(from);setAmt(r>0?r.toFixed(2):'')};

  return(
    <section id="calculator" style={{padding:'110px 24px'}}>

          {/* Live badge */}
          <div style={{display:'flex',justifyContent:'flex-end',marginBottom:24}}>
            <span style={{fontSize:11,color:'#00C853',background:'rgba(0,200,83,.06)',border:'1px solid rgba(0,200,83,.12)',borderRadius:100,padding:'4px 14px',fontWeight:700,display:'flex',alignItems:'center',gap:6,letterSpacing:'.5px'}}>
              <span style={{width:5,height:5,borderRadius:'50%',background:'#00C853',display:'block'}}/>{t.calc.live}
            </span>
          </div>

          {/* FROM */}
          <label style={{fontSize:10,color:'#666',fontWeight:700,letterSpacing:'1.5px',textTransform:'uppercase',display:'block',marginBottom:10}}>{t.calc.give}</label>

            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <CoinIcon id={from} size={32}/>
              <select value={from} onChange={e=>setFrom(e.target.value)} style={{background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.08)',color:'#fff',padding:'15px 30px 15px 8px',borderRadius:14,fontSize:13,fontWeight:600,cursor:'pointer'}}>

            </div>
            <div className="divider-glow"/>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{color:'#ccc',fontSize:14,fontWeight:600}}>{t.calc.total}</span>
              <span style={{color:'#FF6600',fontSize:22,fontWeight:900,fontFamily:"'Cabinet Grotesk',sans-serif"}}>{r>0?fmt(r):'—'} {tObj?.sym}</span>
            </div>
          </div>

          {/* CTA */}
          <a href="https://t.me/swapme_bot" target="_blank" rel="noopener noreferrer" className="btn-brand"
            style={{display:'flex',width:'100%',justifyContent:'center',alignItems:'center',gap:10,padding:'18px',fontSize:16,textDecoration:'none',borderRadius:16,letterSpacing:'-.2px'}}>

              style={{padding:'18px 40px',fontSize:16,textDecoration:'none',display:'inline-flex',alignItems:'center',gap:10,borderRadius:16}}>
              {I.tg} {t.cta.btn}
            </a>
          </div>
          <div className="anim-float hidden lg:flex" style={{justifyContent:'center'}}>
            {imgOk?(
              <div style={{borderRadius:32,overflow:'hidden',boxShadow:'0 32px 80px rgba(0,0,0,.5),0 0 60px rgba(255,102,0,.1)'}}>
                <img src="./mascot.jpeg" alt="SwapMe Fox" style={{maxWidth:380,width:'100%',display:'block'}} onError={()=>setImgOk(false)}/>
              </div>
            ):(
              <div style={{width:280,height:340,borderRadius:32,background:'rgba(255,102,0,.04)',border:'1px solid rgba(255,102,0,.08)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:100}}>🦊</div>
            )}
          </div>
        </div>
      </div>
    </section>
  );
}

/* ═══════════════ FOOTER ═══════════════ */
function Footer({t}){
  return(
    <footer style={{borderTop:'1px solid rgba(255,255,255,.04)',padding:'48px 24px 28px',background:'#101010'}}>
      <div style={{maxWidth:1100,margin:'0 auto'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:32,marginBottom:32}}>
          <div>
            <img src="./logo_full.png" alt="SwapMe" style={{height:24,marginBottom:14}} onError={e=>e.target.style.display='none'}/>
            <p style={{color:'#444',fontSize:11,maxWidth:360,lineHeight:1.65}}>{t.footer.disc}</p>
          </div>
          <div style={{display:'flex',gap:20,flexWrap:'wrap'}}>
            {[['#calculator','Exchange'],['#steps','How it works'],['#why','Why us'],['#faq','FAQ'],['#contact','Contact']].map(([h,l],i)=>(
              <a key={i} href={h} style={{color:'#444',textDecoration:'none',fontSize:12,fontWeight:500,transition:'color .2s'}} onMouseEnter={e=>e.target.style.color='#fff'} onMouseLeave={e=>e.target.style.color='#444'}>{l}</a>
            ))}
          </div>
        </div>
        <div style={{borderTop:'1px solid rgba(255,255,255,.03)',paddingTop:20,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:12}}>
          <span style={{color:'#333',fontSize:11}}>{t.footer.copy}</span>
          <a href="https://t.me/swapme_bot" target="_blank" rel="noopener noreferrer"
            style={{width:34,height:34,borderRadius:10,background:'rgba(255,255,255,.03)',display:'flex',alignItems:'center',justifyContent:'center',color:'#666',textDecoration:'none',transition:'all .2s'}}
            onMouseEnter={e=>{e.currentTarget.style.background='rgba(255,102,0,.1)';e.currentTarget.style.color='#FF6600'}} onMouseLeave={e=>{e.currentTarget.style.background='rgba(255,255,255,.03)';e.currentTarget.style.color='#666'}}>
            {I.tg}
          </a>
        </div>
      </div>
    </footer>
  );
}

/* ═══════════════ APP ═══════════════ */
function App(){
  const[lang,setLang]=useState('ru');
  const t=T[lang];
  useReveal();
  return <>
    <Header lang={lang} setLang={setLang} t={t}/>
    <Hero t={t}/>
    <Stats t={t}/>
    <Calculator t={t}/>
    <HowItWorks t={t}/>
    <Why t={t}/>
    <Currencies t={t}/>
    <FAQ t={t}/>
    <CTA t={t}/>
    <Footer t={t}/>
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
